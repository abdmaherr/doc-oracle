services:
  - type: web
    name: doc-oracle
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: uvicorn app.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: NODE_VERSION
        value: "20.18.0"
